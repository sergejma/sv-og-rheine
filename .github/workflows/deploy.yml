name: Deploy zu all-inkl

# Läuft bei jedem Push auf main (auch CMS-Commits) — baut die Website
# und lädt sie per FTPS auf den all-inkl-Webspace.
# Zugangsdaten liegen in den Repo-Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD.
on:
  workflow_dispatch:

jobs:
  build-und-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Statische Website bauen
        run: npm run build

      - name: Per FTPS zu all-inkl hochladen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./out/
          server-dir: ./
