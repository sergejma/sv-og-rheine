# DecapBridge-Auth (PKCE) — Site-ID aus dem DecapBridge-Dashboard
backend:
  name: git-gateway
  repo: sergejma/sv-og-rheine
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/6a28f2dc-d453-406f-bb0e-4226af9b5e43/pkce
  auth_token_endpoint: /sites/6a28f2dc-d453-406f-bb0e-4226af9b5e43/token
  gateway_url: https://gateway.decapbridge.com

  # Nachvollziehbare Commits: wer hat was geändert
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# PKCE-Profilfelder für die Redakteurs-Anzeige
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: /uploads/logo-cms.png

# Für lokales Testen ohne Login: Zeile einkommentieren und `npx decap-server` starten.
# local_backend: true

locale: de
site_url: https://stalwart-tarsier-11fda8.netlify.app # nach Domain-Umzug: https://www.sv-og-rheine.de
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: berichte
    label: Berichte
    label_singular: Bericht
    folder: content/berichte
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [date, title]
    fields:
      - { label: Titel, name: title, widget: string }
      - {
          label: Datum,
          name: date,
          widget: datetime,
          format: YYYY-MM-DD,
          date_format: DD.MM.YYYY,
          time_format: false,
        }
      - { label: Teaser, name: teaser, widget: text, hint: "1–2 Sätze für die Vorschau auf der Startseite." }
      - { label: Bild, name: image, widget: image, required: false, hint: "Vorschaubild für die Startseite." }
      - label: Text
        name: body
        widget: markdown
        modes: [rich_text]
        buttons: [bold, italic, link, heading-two, heading-three, bulleted-list, numbered-list, quote]
        editor_components: [image]
        hint: "Text schreiben wie in Word — über das Plus-Symbol lassen sich Bilder einfügen."

  - name: vorstand
    label: Vorstand
    files:
      - file: content/vorstand.yml
        name: vorstand
        label: Vorstand
        fields:
          - label: Vorstandsmitglieder
            name: personen
            widget: list
            summary: "{{fields.name}} – {{fields.rolle}}"
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Funktion, name: rolle, widget: string, hint: "z. B. 1. Vorsitzender" }
              - { label: Foto, name: foto, widget: image }
              - { label: E-Mail, name: email, widget: string, required: false, hint: "Schreibweise mit (at) statt @ schützt vor Spam-Robotern." }
              - { label: Telefon, name: telefon, widget: string, required: false }

  - name: mitglieder
    label: Mitglieder
    files:
      - file: content/mitglieder.yml
        name: mitglieder
        label: Mitglieder
        fields:
          - label: Hundeführer
            name: hundefuehrer
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Hund, name: hund, widget: string, required: false }
              - { label: Foto, name: foto, widget: image }
          - label: Mitglieder
            name: mitglieder
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Hund, name: hund, widget: string, required: false }
              - { label: Foto, name: foto, widget: image }

  - name: pruefungsergebnisse
    label: Prüfungen
    files:
      - file: content/pruefungen.yml
        name: pruefungen
        label: Prüfungsergebnisse
        fields:
          - label: Prüfungen
            name: pruefungen
            widget: list
            summary: "{{fields.titel}} am {{fields.datum}}"
            collapsed: true
            fields:
              - { label: Titel, name: titel, widget: string, hint: "z. B. Herbstprüfung der Ortsgruppe Rheine" }
              - { label: Datum, name: datum, widget: string, hint: "z. B. 26.10.2024" }
              - { label: Leistungsrichter, name: richter, widget: string }
              - label: Ergebnisse
                name: ergebnisse
                widget: list
                summary: "{{fields.hundefuehrer}} – {{fields.stufe}}"
                collapsed: true
                fields:
                  - { label: Hundeführer, name: hundefuehrer, widget: string, required: false }
                  - { label: Hund, name: hund, widget: string, required: false }
                  - { label: Stufe, name: stufe, widget: string, required: false, hint: "z. B. IGP1, BH, IBGH1" }
                  - { label: "A (Fährte)", name: a, widget: string, required: false }
                  - { label: "B (Unterordnung)", name: b, widget: string, required: false }
                  - { label: "C (Schutzdienst)", name: c, widget: string, required: false }
                  - { label: Gesamt, name: gesamt, widget: string, required: false }
                  - { label: Note, name: note, widget: string, required: false, hint: "V, SG, G, B oder M" }
                  - { label: Ergebnis, name: ergebnis, widget: string, required: false, hint: "bestanden / nicht bestanden" }

  - name: seiten
    label: Seiten
    files:
      - file: content/seiten/impressum.md
        name: impressum
        label: Impressum
        fields:
          - { label: Titel, name: title, widget: string }
          - { label: Inhalt, name: body, widget: markdown }
      - file: content/seiten/datenschutz.md
        name: datenschutz
        label: Datenschutzerklärung
        fields:
          - { label: Titel, name: title, widget: string }
          - { label: Inhalt, name: body, widget: markdown }

  - name: kalender
    label: Kalender
    files:
      - file: content/termine.yml
        name: termine
        label: Termine
        fields:
          - { label: Jahr, name: jahr, widget: number, value_type: int }
          - label: Termine
            name: termine
            widget: list
            summary: "{{fields.datum}} – {{fields.titel}}"
            fields:
              - { label: Datum, name: datum, widget: string, hint: "z. B. 25.01." }
              - { label: Uhrzeit, name: uhrzeit, widget: string, hint: "z. B. 19:00 Uhr" }
              - { label: Titel, name: titel, widget: string }

  - name: galerie
    label: Galerie
    files:
      - file: content/galerie.yml
        name: galerie
        label: Galeriebilder
        fields:
          - label: Bilder
            name: bilder
            widget: list
            summary: "{{fields.beschreibung}}"
            fields:
              - { label: Bild, name: bild, widget: image }
              - { label: Beschreibung, name: beschreibung, widget: string }
